name: Publish to MCP Registry

# Publishes server.json to the official MCP registry
# (registry.modelcontextprotocol.io) automatically — no human auth needed.
# Authentication is via GitHub Actions OIDC, which maps this repo's owner
# (AgentTanuki) to the `io.github.agenttanuki/*` namespace declared in
# server.json. Runs whenever server.json changes, or on manual dispatch.

on:
  push:
    branches: [main]
    paths:
      - "server.json"
      - ".github/workflows/publish-mcp.yml"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for GitHub OIDC login
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install mcp-publisher
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          # Use the authenticated gh CLI (preinstalled on runners) to grab the
          # latest linux/amd64 release asset — avoids unauthenticated API rate
          # limits and asset-name guesswork.
          gh release download --repo modelcontextprotocol/registry \
            --pattern 'mcp-publisher_linux_amd64.tar.gz' \
            --output mcp-publisher.tar.gz
          # Fail loudly if we somehow didn't get a gzip.
          file mcp-publisher.tar.gz
          tar xzf mcp-publisher.tar.gz mcp-publisher
          chmod +x mcp-publisher
          ./mcp-publisher --help >/dev/null 2>&1 || true

      - name: Validate server.json
        run: ./mcp-publisher validate

      - name: Authenticate (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish
        run: ./mcp-publisher publish

      - name: Verify registry READBACK (hard gate)
        # Publication is not "shipped" until the OFFICIAL registry serves it
        # back: this step fails the workflow unless the readback contains our
        # server at the just-published version WITH the trust _meta block.
        run: |
          set -euo pipefail
          cat > /tmp/readback.py <<'PYEOF'
          import json, sys, time, urllib.parse, urllib.request
          spec = json.load(open("server.json"))
          name, version = spec["name"], spec["version"]
          url = ("https://registry.modelcontextprotocol.io/v0/servers?search="
                 + urllib.parse.quote(name))
          for attempt in range(12):
              try:
                  with urllib.request.urlopen(url, timeout=30) as r:
                      body = json.loads(r.read().decode())
              except Exception as e:
                  body = {}
                  print(f"attempt {attempt+1}: fetch failed: {e}")
              for s in body.get("servers", []):
                  detail = s.get("server", s)
                  if detail.get("name") == name and \
                     detail.get("version") == version:
                      meta = detail.get("_meta") or s.get("_meta") or {}
                      if any("agent-guild" in k for k in meta):
                          print(f"readback OK: {name}@{version} with trust _meta")
                          sys.exit(0)
                      print(f"{name}@{version} served WITHOUT trust _meta")
                      sys.exit(3)
              print(f"attempt {attempt+1}: not yet visible")
              time.sleep(10)
          print(f"::error::registry readback never served {name}@{version}")
          sys.exit(1)
          PYEOF
          python3 /tmp/readback.py
