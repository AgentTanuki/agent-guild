# Agent Guild — machine-operated ship loop (corrective pass 2026-07-22, r2).
#
#   ship/<name> push → PR to main (opened here) → full `ci` certifies the head
#   (explicitly dispatched: GITHUB_TOKEN-created PRs never trigger
#   pull_request runs) → on green ci this workflow decides via the
#   UNIT-TESTED live/scripts/ship_decision.py:
#
#     refuse_unprotected    main not branch-protected → the loop refuses.
#                           Protection is MANDATORY (required PRs, required
#                           non-release ci checks, strict up-to-date,
#                           enforce_admins/no bypass) — see
#                           live/scripts/protect_main.sh.
#     refuse_head_mismatch  a newer push supersedes this certification.
#     update_and_recertify  main advanced after certification: the COMBINED
#                           state was never tested → update the branch with
#                           main, dispatch ci again, merge only the
#                           re-certified result.
#     merge                 head == certified SHA and already contains main.
#
#   After the merge, the job checks out THE EXACT MERGED SHA and runs the
#   deployment-aware release gate from that tree (production must serve that
#   SHA and pass the live probes). A red gate triggers MACHINE-COMPLETE
#   recovery: an automatic revert shipped back through this same certified
#   loop (revert → PR → ci → merge → gate). The issue it also files is
#   telemetry, never the recovery mechanism. A failed revert halts instead of
#   oscillating.
#
# No human anywhere in the loop. Autonomous sessions: push `ship/<topic>` and
# stop. Direct pushes to main are refused by branch protection.
name: ship

on:
  push:
    branches: ["ship/**"]
  workflow_run:
    workflows: [ci]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: write
  issues: write

jobs:
  open-pr:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: open (or reuse) the PR to main, then certify the head
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          existing=$(gh pr list --head "$BRANCH" --base main --state open \
                       --json number --jq '.[0].number // empty')
          if [ -z "$existing" ]; then
            title=$(git log -1 --format=%s)
            gh pr create --base main --head "$BRANCH" \
              --title "$title" \
              --body "$(printf 'Machine-operated ship branch `%s`.\n\nMerges automatically when the full `ci` workflow certifies the exact combined state with main; the deployment-aware release gate then verifies production serves the merged SHA, with automatic certified revert on a red gate. See .github/workflows/ship.yml.' "$BRANCH")"
          else
            echo "PR #$existing already open for $BRANCH"
          fi
          # GITHUB_TOKEN-created PRs never trigger ci's pull_request run
          # (GitHub's recursion guard); workflow_dispatch is the documented
          # exception that DOES create runs.
          gh workflow run ci.yml --ref "$BRANCH"

  auto-merge-and-gate:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'ship/') &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    # same group as ci's release-gate: one production certification at a time.
    concurrency:
      group: release-gate-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: decide (unit-tested core), then merge only a certified combined state
        id: merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          CERTIFIED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          echo "merged=false" >> "$GITHUB_OUTPUT"
          pr=$(gh pr list --head "$BRANCH" --base main --state open \
                 --json number,headRefOid --jq '.[0] // empty')
          if [ -z "$pr" ]; then
            echo "no open PR for $BRANCH (already merged or closed) — nothing to do"
            exit 0
          fi
          number=$(echo "$pr" | jq -r .number)
          head=$(echo "$pr" | jq -r .headRefOid)
          git fetch --force origin main "refs/heads/$BRANCH" || git fetch --force origin main
          main_sha=$(git rev-parse origin/main)
          if git merge-base --is-ancestor "$main_sha" "$head" 2>/dev/null; then
            ancestor=true
          else
            ancestor=false
          fi
          protected=$(gh api "repos/${{ github.repository }}/branches/main" --jq .protected)
          decision=$(python3 live/scripts/ship_decision.py merge \
                       --protected "$protected" \
                       --pr-head "$head" \
                       --certified "$CERTIFIED_SHA" \
                       --main-is-ancestor "$ancestor")
          action=$(echo "$decision" | jq -r .action)
          echo "decision: $decision"
          case "$action" in
            refuse_unprotected)
              # protection is mandatory — refuse loudly, once per repo state
              gh issue list --state open --search "SHIP LOOP HALTED: main unprotected" --json number --jq '.[0].number // empty' | grep -q . || \
                gh issue create --title "SHIP LOOP HALTED: main unprotected" \
                  --body "The ship workflow refuses to merge while main has no branch protection. Run live/scripts/protect_main.sh (required PRs + required non-release ci checks + strict up-to-date + enforce_admins). This is the one-time settings action."
              exit 0 ;;
            refuse_head_mismatch)
              echo "newer push will re-certify; refusing this round"
              exit 0 ;;
            update_and_recertify)
              echo "main advanced after certification — updating branch + re-dispatching ci"
              if gh api -X PUT "repos/${{ github.repository }}/pulls/$number/update-branch" \
                   -f expected_head_sha="$head"; then
                gh workflow run ci.yml --ref "$BRANCH"
              else
                gh issue create --title "SHIP BLOCKED: cannot auto-update $BRANCH with main" \
                  --body "PR #$number is behind main and the automatic update failed (likely a conflict). The next autonomous session should rebase and push $BRANCH again — the loop takes it from there."
              fi
              exit 0 ;;
            merge) ;;
            *) echo "unknown action $action"; exit 1 ;;
          esac
          # decision: merge — server.json diff decided BEFORE merging
          server_json_changed=$(gh pr diff "$number" --name-only | grep -cx 'server.json' || true)
          if ! gh pr merge "$number" --squash --delete-branch; then
            # raced by another landing between decision and merge: go around
            echo "merge refused by GitHub (raced or newly stale) — updating + re-certifying"
            gh api -X PUT "repos/${{ github.repository }}/pulls/$number/update-branch" \
              -f expected_head_sha="$head" || true
            gh workflow run ci.yml --ref "$BRANCH"
            exit 0
          fi
          merged_sha=$(gh pr view "$number" --json mergeCommit --jq .mergeCommit.oid)
          echo "merged PR #$number → main @ $merged_sha"
          echo "merged=true" >> "$GITHUB_OUTPUT"
          echo "merged_sha=$merged_sha" >> "$GITHUB_OUTPUT"
          echo "server_json_changed=$server_json_changed" >> "$GITHUB_OUTPUT"
      - name: check out THE EXACT MERGED SHA (the gate must run from the code production serves)
        if: steps.merge.outputs.merged == 'true'
        run: |
          set -euo pipefail
          git fetch --force origin main
          git checkout --force "${{ steps.merge.outputs.merged_sha }}"
          git rev-parse HEAD
      - uses: actions/setup-python@v5
        if: steps.merge.outputs.merged == 'true'
        with:
          python-version: "3.11"
      - if: steps.merge.outputs.merged == 'true'
        run: pip install -r live/guild/requirements.txt -r live/trustplane/requirements/core.txt
      - name: deployment-aware release gate (production must serve the merged SHA)
        if: steps.merge.outputs.merged == 'true'
        run: |
          python live/scripts/release_gate.py \
            --sha "${{ steps.merge.outputs.merged_sha }}" \
            --timeout 900 --interval 20 \
            --attestation release_attestation.json
      - name: upload release attestation (machine-readable)
        if: always() && steps.merge.outputs.merged == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-attestation-${{ steps.merge.outputs.merged_sha }}
          path: release_attestation.json
          if-no-files-found: warn
      - name: dispatch registry publish (server.json changed in this ship)
        if: steps.merge.outputs.merged == 'true' && steps.merge.outputs.server_json_changed != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run publish-mcp.yml --ref main
      - name: red gate → machine-complete recovery (certified revert) + telemetry issue
        if: failure() && steps.merge.outputs.merged == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          MERGED_SHA: ${{ steps.merge.outputs.merged_sha }}
        run: |
          set -euo pipefail
          decision=$(python3 live/scripts/ship_decision.py recover --failed-branch "$BRANCH")
          action=$(echo "$decision" | jq -r .action)
          short=${MERGED_SHA:0:9}
          gh issue create \
            --title "RED RELEASE: gate failed for $MERGED_SHA" \
            --body "The ship workflow merged $MERGED_SHA but the deployment-aware release gate did NOT certify production. Recovery decision: $decision. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}. This issue is telemetry — recovery (if any) is the automatic certified revert." || true
          if [ "$action" != "revert" ]; then
            echo "halting: $decision"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --force origin main
          git checkout -B "ship/revert-$short" origin/main
          git revert --no-edit "$MERGED_SHA"
          git push --force origin "ship/revert-$short"
          # token pushes don't trigger `on: push` — drive the loop directly
          gh pr create --base main --head "ship/revert-$short" \
            --title "Automatic certified revert of red release $short" \
            --body "The release gate failed for $MERGED_SHA. This revert ships through the SAME loop: ci certifies it, the workflow merges it, Render deploys it, and the gate certifies the RECOVERY. No human is required." || true
          gh workflow run ci.yml --ref "ship/revert-$short"
